<div class="container">
  <form (ngSubmit)="onSubmit()" #formCategoria="ngForm" novalidate>
    
    <!-- Título dinámico -->
    <div class="text-center mb-4">
      <h4 class="fw-bold">
        <i class="bi bi-tags-fill text-primary fs-4 me-2"></i>
        {{ formModel.idCategoria ? 'Editar Categoría' : 'Nueva Categoría' }}
      </h4>
    </div>

    <!-- Campo: Nombre -->
    <div class="mb-3">
      <label for="nombreCategoria" class="form-label">
        <i class="bi bi-tag-fill me-1 text-secondary"></i>
        Nombre de Categoría
      </label>
      <input 
        type="text"
        id="nombreCategoria"
        name="nombreCategoria"
        class="form-control"
        [(ngModel)]="formModel.nombreCategoria"
        [ngModelOptions]="{standalone: true}"
        required
        minlength="3"
        placeholder="Ej: Electrónicos">

      <!-- Mensajes de error -->
      <div *ngIf="formCategoria.submitted && !formModel.nombreCategoria" class="text-danger small mt-1">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        El nombre es obligatorio.
      </div>
    </div>

    <!-- Campo: Descripción -->
    <div class="mb-3">
      <label for="descripcion" class="form-label">
        <i class="bi bi-card-text me-1 text-secondary"></i>
        Descripción
      </label>
      <textarea
        id="descripcion"
        name="descripcion"
        class="form-control"
        [(ngModel)]="formModel.descripcion"
        [ngModelOptions]="{standalone: true}"
        required
        rows="3"
        placeholder="Breve descripción de la categoría">
      </textarea>

      <div *ngIf="formCategoria.submitted && !formModel.descripcion" class="text-danger small mt-1">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        La descripción es obligatoria.
      </div>
    </div>

    <!-- Botones -->
    <div class="d-flex justify-content-end">
      <button 
        type="button" 
        class="btn btn-secondary me-2"
        data-bs-dismiss="modal">
        <i class="bi bi-x-circle me-1"></i>
        Cancelar
      </button>

      <button 
        type="submit" 
        class="btn btn-primary"
        [disabled]="formCategoria.invalid">
        <i class="bi bi-save me-1"></i>
        {{ formModel.idCategoria ? 'Guardar cambios' : 'Agregar categoría' }}
      </button>
    </div>

  </form>
</div>
