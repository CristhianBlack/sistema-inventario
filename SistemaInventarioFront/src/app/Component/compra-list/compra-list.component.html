<div class="container py-4 persona-container">
  <!-- 🔹 Encabezado -->
  <div class="text-center mb-5">
    <h3 class="fw-bold text-gradient mb-2">
      <i class="bi bi-people-fill me-2"></i>Listado de Compras
    </h3>
    <p class="text-muted mb-4">Consulta rápida de compras</p>

    <button class="btn btn-gradient px-4 shadow-sm" (click)="abrirModalEditar()">
      <i class="bi bi-plus-circle me-2"></i> Nueva Compra
    </button>
  </div>

  <!-- 🔹 Loader -->
  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Cargando compras...</p>
  </div>

  <!-- 🔹 Si no hay personas -->
  <div *ngIf="!loading && compras.length === 0" class="alert alert-info text-center shadow-sm mt-4">
    <i class="bi bi-info-circle me-2"></i> No hay compras registradas.
  </div>

  <!-- 🔹 Tarjetas -->
  <div class="row g-4 justify-content-center" *ngIf="!loading && compras.length > 0">
    <div class="col-md-4 col-sm-6" *ngFor="let compra of compras">
      <div class="card persona-card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">

          <!-- 🔸 Cabecera de la tarjeta -->
          <div class="d-flex align-items-center mb-3">
            <div class="avatar bg-gradient me-3">
              <i class="bi bi-person-badge text-white fs-4"></i>
            </div>
            <div>
              <h5 class="fw-semibold text-light mb-0"> N° {{ compra.idCompra }}</h5>
            </div>
          </div>

          <!-- 🔸 Datos -->
          <ul class="list-unstyled text-muted small mb-3">
            <li><i class="bi bi-credit-card-2-front me-2 text-info"></i>{{ compra.fechaCompra }}</li>
            <li><i class="bi bi-credit-card-2-front me-2 text-info"></i>{{ compra.total }}</li>
            <li><i class="bi bi-credit-card-2-front me-2 text-info"></i>{{ compra.idProveedor }}</li>
            
          </ul>
          

            <div class="d-flex gap-2 justify-content-center">
              <button class="btn btn-outline-warning btn-sm d-flex align-items-center px-3"
              (click)="abrirModalEditar(compra)">
                <i class="bi bi-eye me-1"></i> Info
              </button>
              <!--<button class="btn btn-outline-danger btn-sm d-flex align-items-center px-3"
                      (click)="eliminarPersona(compra.idCompra!)"
                      [disabled]="true">
                <i class="bi bi-trash me-1"></i> Eliminar
              </button>-->
            </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🔹 Modal -->
  <div #modalCompra class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content modal-dark rounded-4 shadow-lg">
      
      <!-- 🔹 Header fijo -->
      <div class="modal-header border-0 pb-0 sticky-top">
        <h5 class="modal-title text-primary fw-bold">
          <i class="bi bi-person-lines-fill me-2"></i>
          {{ compraSeleccionada ? 'Editar Compra' : 'Agregar Compra' }}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <!-- 🔹 Cuerpo scrollable -->
      <div class="modal-body modal-scroll">
        <app-compra-form
          [compra]="compraSeleccionada"
          (formGuardado)="cerrarModalYActualizarLista()">
        </app-compra-form>
      </div>

      <!-- 🔹 Footer fijo -->
      <div class="modal-footer border-0 pt-0 sticky-bottom">
        <small class="text-muted">Sistema de Inventario © 2025</small>
      </div>

    </div>
  </div>
</div>
