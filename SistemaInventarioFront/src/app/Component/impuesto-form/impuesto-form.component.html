<div class="container">
    <form (ngSubmit)="onSubmit()" #formFormaPago="ngForm" novalidate>
        
        <!--Titulo dinamico-->
        <div class="text-center mb-4">
            <h4 class="fw-bold"> <i class="fa-solid fa-city text-white fs-5 me-2"></i>
                {{formModel.idImpuesto   ? 'Impuesto' : ' ' }}
            </h4>
        </div>

        <div class="mb-3">
            <label for="tipoImpuesto" class="form-label">Tipo Impuesto</label>
            <input type="text" id="tipoImpuesto" name="tipoImpuesto" class="form-control" disabled="true"
            [(ngModel)]="formModel.tipoImpuesto" required minlength="3">

        </div>

        <div class="mb-3">
            <label for="porcentaje" class="form-label">Porcentaje</label>
            <input type="text" id="porcentaje" name="porcentaje" class="form-control" disabled="true"
            [value]="porcentajeVista" required minlength="3">

        </div>

       

        <!-- Campo: Activo (opcional)
    <div class="form-check mb-4">
      <input 
        class="form-check-input" 
        type="checkbox" 
        id="activo" 
        name="activo"
        [(ngModel)]="formModel.activo">
      <label class="form-check-label" for="activo">
        Activo
      </label>
    </div>-->

        <div class="d-flex justify-content-end">
            <button type="button" class="btn btn-secondary me-2"  data-bs-dismiss="modal" >Cancelar</button>

            <!--<button type="submit" class="btn btn-primary" [disabled]="formFormaPago.invalid">
                {{formModel.idFormaPago ? 'Guardar cambios' : ''}}
            </button>-->
        </div>
    </form>
</div>
