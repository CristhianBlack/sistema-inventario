<div class="container py-4">
  <form
    (ngSubmit)="onSubmit(formPersona)"
    #formPersona="ngForm"
    novalidate
    class="p-4 rounded-4 shadow-lg formulario"
  >

    <!-- Encabezado -->
    <div class="text-center mb-4">
      <h4 class="text-primary fw-bold mb-1">
        <i class="bi bi-person-vcard me-2"></i>
        {{ formModel.idPersona ? "Editar Persona" : "Nueva Persona" }}
      </h4>
      <p class="text-muted small">
        <i class="bi bi-info-circle me-1"></i>
        Complete los datos personales y de contacto
      </p>
    </div>

    <!-- ===================== -->
    <!-- TIPO DE PERSONA -->
    <!-- ===================== -->
    <fieldset class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-people me-1"></i>
        Tipo de Persona
      </legend>

      <div class="row">
        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-person-check me-1"></i>
            Seleccione tipo de persona
          </label>

          <select
            class="form-select"
            name="idTipoPersona"
            [(ngModel)]="formModel.idTipoPersona"
            required
            (change)="onTipoPersonaChange()"
          >
            <option [ngValue]="null" disabled>Seleccione...</option>
            <option *ngFor="let t of tipoPersonas" [ngValue]="t.idTipoPersona">
              {{ t.nombreTipoPersona.replace("_", " ").toLowerCase() | titlecase }}
            </option>
          </select>

          <div
            *ngIf="formPersona.controls['idTipoPersona']?.invalid && formPersona.controls['idTipoPersona']?.touched"
            class="text-danger small mt-1"
          >
            El tipo de persona es obligatorio.
          </div>
        </div>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- RAZÓN SOCIAL -->
    <!-- ===================== -->
    <fieldset *ngIf="!esNatural" class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-building me-1"></i>
        Razón Social
      </legend>

      <div class="row g-4">
        <div class="col-md-4">
          <label class="form-label">
            <i class="bi bi-briefcase me-1"></i>
            Razón Social
          </label>

          <input
            type="text"
            class="form-control"
            name="razonSocial"
            [(ngModel)]="formModel.razonSocial"
            [required]="esNatural"
            [disabled]="esNatural"
            minlength="3"
            placeholder="EJ: Sultana"
          />

          <div
            *ngIf="formPersona.controls['razonSocial']?.invalid && formPersona.controls['razonSocial']?.touched"
            class="text-danger small mt-1"
          >
            La razón social es obligatoria.
          </div>
        </div>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- DATOS PERSONALES -->
    <!-- ===================== -->
    <fieldset class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-person-lines-fill me-1"></i>
        Datos personales o contacto
      </legend>

      <div class="row g-4">
        <div class="col-md-4">
          <label class="form-label">
            <i class="bi bi-person me-1"></i>
            Nombre
          </label>

          <input
            type="text"
            class="form-control"
            name="nombre"
            [(ngModel)]="formModel.nombre"
            required
            minlength="3"
            placeholder="EJ: Juan Carlos"
          />
        </div>

        <div class="col-md-4">
          <label class="form-label">
            <i class="bi bi-person-badge me-1"></i>
            Apellido
          </label>

          <input
            type="text"
            class="form-control"
            name="apellido"
            [(ngModel)]="formModel.apellido"
            minlength="3"
            placeholder="EJ: Gómez"
          />
        </div>

        <div class="col-md-4">
          <label class="form-label">
            <i class="bi bi-person-bounding-box me-1"></i>
            Segundo Apellido
          </label>

          <input
            type="text"
            class="form-control"
            name="segundoApellido"
            [(ngModel)]="formModel.segundoApellido"
            placeholder="EJ: López"
          />
        </div>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- DOCUMENTO -->
    <!-- ===================== -->
    <fieldset class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-card-text me-1"></i>
        Documento
      </legend>

      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-card-checklist me-1"></i>
            Tipo de Documento
          </label>

          <select
            class="form-select"
            name="idTipoDocumento"
            [(ngModel)]="formModel.idTipoDocumento"
            required
          >
            <option [ngValue]="null" disabled>Seleccione...</option>
            <option *ngFor="let tipo of tipoDocumentos" [ngValue]="tipo.idTipoDocumento">
              {{ formatearTipoDocumento(tipo.nombreTipoDocumento) }}
            </option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-hash me-1"></i>
            N° Documento
          </label>

          <input
            type="text"
            class="form-control"
            name="documentoPersona"
            [(ngModel)]="formModel.documentoPersona"
            required
            placeholder="EJ: 1115078546"
          />
        </div>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- CONTACTO -->
    <!-- ===================== -->
    <fieldset class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-telephone me-1"></i>
        Contacto
      </legend>

      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-phone me-1"></i>
            Teléfono
          </label>

          <input
            type="text"
            class="form-control"
            name="telefono"
            [(ngModel)]="formModel.telefono"
            required
            placeholder="EJ: 3006549874"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-envelope me-1"></i>
            Email
          </label>

          <input
            type="email"
            class="form-control"
            name="email"
            [(ngModel)]="formModel.email"
            required
            placeholder="EJ: juango23@hotmail.com"
          />
        </div>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- UBICACIÓN -->
    <!-- ===================== -->
    <fieldset class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-geo-alt me-1"></i>
        Ubicación
      </legend>

      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-signpost me-1"></i>
            Dirección
          </label>

          <input
            type="text"
            class="form-control"
            name="direccion"
            [(ngModel)]="formModel.direccion"
            required
            minlength="3"
            placeholder="EJ: Calle 4 # 13 - 23"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">
            <i class="bi bi-building me-1"></i>
            Ciudad
          </label>

          <select
            class="form-select"
            name="idCiudad"
            [(ngModel)]="formModel.idCiudad"
            required
          >
            <option [ngValue]="null" disabled>Seleccione...</option>
            <option *ngFor="let c of ciudades" [ngValue]="c.idCiudad">
              {{ c.ciudad }}
            </option>
          </select>
        </div>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- ROLES -->
    <!-- ===================== -->
    <fieldset *ngIf="esAdminSistema" class="fieldset-modern mb-4">
      <legend>
        <i class="bi bi-shield-lock me-1"></i>
        Roles
      </legend>

      <div *ngFor="let rol of listaRoles; trackBy: trackByRol" class="form-check mb-1">
        <input
          class="form-check-input"
          type="checkbox"
          [id]="'rol-' + rol.idRolPersona"
          [checked]="formModel.idsRoles?.includes(rol.idRolPersona)"
          (change)="onRolChange($event, rol.idRolPersona)"
        />
        <label class="form-check-label" [for]="'rol-' + rol.idRolPersona">
          <i class="bi bi-person-gear me-1"></i>
          {{ rol.nombreRol }}
        </label>
      </div>
    </fieldset>

    <!-- ===================== -->
    <!-- BOTONES -->
    <!-- ===================== -->
    <div class="d-flex justify-content-end mt-4">
      <button type="button" class="btn btn-outline-light me-2" data-bs-dismiss="modal">
        <i class="bi bi-x-circle me-1"></i>
        Cancelar
      </button>

      <button type="submit" class="btn btn-gradient" [disabled]="formPersona.invalid">
        <i class="bi bi-save2 me-1"></i>
        {{ formModel.idPersona ? "Guardar cambios" : "Agregar persona" }}
      </button>
    </div>

  </form>
</div>
