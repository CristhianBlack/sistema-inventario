<div class="container py-4">
  <form (ngSubmit)="onSubmit(formRolPersona)" #formRolPersona="ngForm" novalidate class="formulario p-4 rounded-4 shadow-lg">

    <!-- 🔹 Encabezado -->
    <div class="text-center mb-4">
      <h4 class="text-white fw-bold mb-1">
        <i class="bi bi-person-rolodex me-2"></i>
        {{ formModel.idRolPersona ? 'Rol' : '' }}
      </h4>
      <p class="text-muted small">Datos del rol.</p>
    </div>

    <div class="row g-4">
      <!-- Nombre -->
      <div class="mb-3">
        <label for="nombreRol" class="form-label">
          <i class="bi bi-tag me-1 text-info"></i>
          Nombre Rol
        </label>
        <input
          type="text"
          id="nombreRol"
          name="nombreRol"
          class="form-control"
          [value]="formatearRol(formModel.nombreRol)"
          disabled="true"
        />
        <div *ngIf="formRolPersona.submitted && !formModel.nombreRol" class="text-danger small mt-1">
          El nombre es obligatorio
        </div>
      </div>

      <!-- Descripción -->
      <div class="mb-3">
        <label for="descripcion" class="form-label">
          <i class="bi bi-file-text me-1 text-info"></i>
          Descripción Rol
        </label>
        <textarea
          id="descripcion"
          name="descripcion"
          class="form-control"
          [(ngModel)]="formModel.descripcion"
          rows="3"
          disabled="true">
        </textarea>
        <div *ngIf="formRolPersona.submitted && !formModel.descripcion" class="text-danger small mt-1">
          El descripcion es obligatorio
        </div>
      </div>
    </div>

    <!-- Botones -->
    <div class="d-flex justify-content-end mt-4">
      <button type="button" class="btn btn-outline-light me-2" data-bs-dismiss="modal">
        <i class="bi bi-x-circle me-1"></i>
        Cerrar
      </button>
    </div>

  </form>
</div>
