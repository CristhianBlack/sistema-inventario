<div class="container">
  <form
    (ngSubmit)="onSubmit(formTipoDocumento)"
    #formTipoDocumento="ngForm"
    novalidate
  >

    <!-- 🔹 Título dinámico -->
    <div class="text-center mb-4">
      <h4 class="fw-bold">
        <i class="bi bi-person-vcard-fill fs-4 me-2"></i>
        {{
          formModel.idTipoDocumento
            ? "Tipo de Documento"
            : ""
        }}
      </h4>
    </div>

    <!-- 🔹 Tipo Documento -->
    <div class="mb-3">
      <label for="nombreTipoDocumento" class="form-label">
        <i class="bi bi-card-text me-1 text-info"></i>
        Tipo Documento
      </label>
      <input
        type="text"
        id="nombreTipoDocumento"
        name="nombreTipoDocumento"
        class="form-control"
        [value]="formatearTipoDocumento(formModel.nombreTipoDocumento)"
        required
        minlength="3"
        placeholder="EJ: Cedula Ciudadania"
        disabled="true"
      />

      <!-- Mensajes de error -->
      <div
        *ngIf="formTipoDocumento.submitted && !formModel.nombreTipoDocumento"
        class="text-danger small mt-1"
      >
        El tipo de documento es obligatorio
      </div>
    </div>

    <!-- 🔹 Sigla -->
    <div class="mb-3">
      <label for="sigla" class="form-label">
        <i class="bi bi-alphabet-uppercase me-1 text-info"></i>
        Sigla del tipo documento
      </label>
      <input
        type="text"
        id="sigla"
        name="sigla"
        class="form-control"
        [(ngModel)]="formModel.sigla"
        required
        minlength="2"
        placeholder="EJ: CC"
        disabled="true"
      />

      <!-- Mensajes de error -->
      <div
        *ngIf="formTipoDocumento.submitted && !formModel.sigla"
        class="text-danger small mt-1"
      >
        La sigla es obligatoria
      </div>
    </div>

    <!-- 🔹 Botones -->
    <div class="d-flex justify-content-end">
      <button
        type="button"
        class="btn btn-secondary me-2"
        data-bs-dismiss="modal"
      >
        <i class="bi bi-x-circle me-1"></i>
        Cerrar
      </button>
    </div>

  </form>
</div>
