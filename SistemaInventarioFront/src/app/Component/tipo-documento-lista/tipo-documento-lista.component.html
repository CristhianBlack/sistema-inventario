<div class="container py-4 persona-container">
  <!-- 🔹 Encabezado -->
  <div class="text-center mb-5">
    <h3 class="fw-bold text-gradient mb-2">
      <i class="bi bi-person-vcard-fill fs-4 me-2"></i>
      Listado de Tipo Documento
    </h3>
    <p class="text-muted mb-4">Consulta rápida de tipo de documento</p>

  </div>

  <!-- 🔹 Loader -->
  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Cargando Categorías...</p>
  </div>

  <!-- 🔹 Sin datos -->
  <div *ngIf="!loading && tipoDocumentos.length === 0"
       class="alert alert-info text-center shadow-sm mt-4">
    <i class="bi bi-info-circle me-2"></i>
    No hay personas registradas.
  </div>

  <!-- 🔹 Tarjetas -->
  <div class="row g-4 justify-content-center"
       *ngIf="!loading && tipoDocumentos.length > 0">

    <div class="col-md-4 col-sm-6"
         *ngFor="let tipoDocumento of tipoDocumentos">

      <div class="card persona-card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">

          <!-- 🔸 Cabecera -->
          <div class="d-flex align-items-center mb-3">
            <div class="avatar bg-gradient me-3">
              <i class="bi bi-person-vcard-fill text-white fs-4"></i>
            </div>
            <div>
              <h5 class="fw-semibold text-light mb-0">
                {{ formatearTipoDocumento(tipoDocumento.nombreTipoDocumento) }}
              </h5>
            </div>
          </div>

          <!-- 🔸 Acciones -->
          <div class="d-flex gap-2 justify-content-center">
            <button
              class="btn btn-outline-warning btn-sm d-flex align-items-center px-3"
              (click)="abrirModalEditar(tipoDocumento)">
              <i class="bi bi-eye me-1"></i>
               Info
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- 🔹 Modal -->
  <div #modalTipoDocumento class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content modal-dark rounded-4 shadow-lg">

        <!-- 🔹 Header -->
        <div class="modal-header border-0 pb-0 sticky-top">
          <h5 class="modal-title text-white fw-bold">
            <i class="bi bi-person-vcard-fill fs-4 me-2"></i>
            {{ tipoDocumentoSeleccionado ? 'Tipo de Documento' : '' }}
          </h5>
          <button type="button"
                  class="btn-close btn-close-white"
                  data-bs-dismiss="modal"
                  aria-label="Cerrar"></button>
        </div>

        <!-- 🔹 Body -->
        <div class="modal-body modal-scroll">
          <app-tipo-documento-form
            [tipoDocumento]="tipoDocumentoSeleccionado"
            (formGuardado)="cerrarModalYActualizarLista()">
          </app-tipo-documento-form>
        </div>

        <!-- 🔹 Footer -->
        <div class="modal-footer border-0 pt-0 sticky-bottom">
          <small class="text-muted">© 2026 SIGCO</small>
        </div>

      </div>
    </div>
  </div>
</div>
