<div class="container">
  <form (ngSubmit)="onSubmit()" #formTipoPersona="ngForm" novalidate>

    <!-- Título -->
    <div class="text-center mb-4">
      <h4 class="fw-bold">
        <i class="bi bi-person-fill text-white fs-4"></i>
        {{
          formModel.idTipoPersona
            ? "Tipo de Persona"
            : ""
        }}
      </h4>
    </div>

    <!-- Tipo Persona -->
    <div class="mb-3">
      <label for="nombreTipoPersona" class="form-label">
        <i class="bi bi-tag me-1"></i> Tipo Persona
      </label>

      <input
        type="text"
        id="nombreTipoPersona"
        name="nombreTipoPersona"
        class="form-control"
        [value]="formatearTipoPersona(formModel.nombreTipoPersona)"
        disabled
      />

      <div
        *ngIf="formTipoPersona.submitted && !formModel.nombreTipoPersona"
        class="text-danger small mt-1"
      >
        <i class="bi bi-exclamation-circle me-1"></i>
        El tipo de persona es obligatorio
      </div>
    </div>

    <!-- Acciones -->
    <div class="d-flex justify-content-end gap-2">
      <button
        type="button"
        class="btn btn-outline-secondary"
        data-bs-dismiss="modal"
        title="Cerrar"
      >
        <i class="bi bi-x-circle"></i>
        Cerrar
      </button>

      <!--
      <button
        type="submit"
        class="btn btn-outline-primary"
        [disabled]="formTipoPersona.invalid"
        title="Guardar"
      >
        <i class="bi bi-save"></i>
      </button>
      -->
    </div>

  </form>
</div>
