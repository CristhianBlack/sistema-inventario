<div class="container">
    <form (ngSubmit)="onSubmit(formUnidadMedida)" #formUnidadMedida="ngForm" novalidate>
        
        <!--Titulo dinamico-->
        <div class="text-center mb-4">
            <h4 class="fw-bold"> <i class="fa-solid fa-city text-white fs-5 me-2"></i>
                {{formModel.idUnidadMedida ? 'Editar Unidad Medida' : 'Nueva Unidad Medida' }}
            </h4>
        </div>

        <div class="mb-3">
            <label for="nombreUnidad" class="form-label">Unidad Medida</label>
            <input type="text" id="nombreUnidad" name="nombreUnidad" class="form-control"
            [(ngModel)]="formModel.nombreMedida" required minlength="3" placeholder="EJ: Gramos">

            <!-- Mensajes de error -->
             <div *ngIf="formUnidadMedida.submitted && !formModel.nombreMedida" class="text-danger small mt-1">
                La unidad de medida es obligatoria
             </div>
        </div>
        <div class="mb-3">
            <label for="sigla" class="form-label">Sigla Unidad Medida</label>
            <input type="text" id="sigla" name="sigla" class="form-control"
            [(ngModel)]="formModel.sigla" required minlength="2" placeholder="EJ: Gr">

            <!-- Mensajes de error -->
             <div *ngIf="formUnidadMedida.submitted && !formModel.sigla" class="text-danger small mt-1">
                La sigla es obligatoria
             </div>
        </div>

        <!-- Campo: Activo (opcional)
    <div class="form-check mb-4">
      <input 
        class="form-check-input" 
        type="checkbox" 
        id="activo" 
        name="activo"
        [(ngModel)]="formModel.activo">
      <label class="form-check-label" for="activo">
        Activo
      </label>
    </div>-->

        <div class="d-flex justify-content-end">
            <button type="button" class="btn btn-secondary me-2"  data-bs-dismiss="modal" >Cancelar</button>

            <button type="submit" class="btn btn-primary" [disabled]="formUnidadMedida.invalid">
                {{formModel.idUnidadMedida ? 'Guardar cambios' : 'Agregar Unidad Medida'}}
            </button>
        </div>
    </form>
</div>
